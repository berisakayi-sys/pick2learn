# Codemagic CI/CD config for Pick2Learn.
#
# Two workflows:
#   * ios-adhoc    — builds a SIGNED ad-hoc .ipa (installs on your registered
#                    iPad for ~1 year via a Safari link, no cable). USE THIS.
#   * ios-unsigned — builds an UNSIGNED .ipa (for Sideloadly). Kept as a backup.

workflows:
  # ---------------------------------------------------------------------------
  # SIGNED ad-hoc build — installs straight onto your iPad over the internet.
  # ---------------------------------------------------------------------------
  ios-adhoc:
    name: iOS Ad Hoc (signed for iPad)
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Makes the App Store Connect API key (added in Codemagic UI as
    # "pick2learn_asc") available to the signing CLI below.
    environment:
      # MANUAL signing: point directly at the provisioning profile + certificate
      # already stored in Codemagic's Code signing identities. p2l_profile_a is
      # the ad-hoc profile whose certificate (pick2learn_cert) Codemagic holds
      # the private key for, so signing works and no new certificate is created.
      ios_signing:
        provisioning_profiles:
          - p2l_profile_a
        certificates:
          - pick2learn_cert
      flutter: 3.32.5
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Apply provisioning profiles + generate export options
        # Writes /Users/builder/export_options.plist from the profiles Codemagic
        # already installed, which the build step below needs.
        script: xcode-project use-profiles
      - name: Build signed ad-hoc IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

  # ---------------------------------------------------------------------------
  # UNSIGNED build (backup, for Sideloadly). Not needed if ios-adhoc works.
  # ---------------------------------------------------------------------------
  ios-unsigned:
    name: iOS unsigned IPA (for sideloading)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.5
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS (no code signing)
        script: flutter build ios --release --no-codesign
      - name: Package into an unsigned .ipa
        script: |
          set -e
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r9 Pick2Learn-unsigned.ipa Payload
          mv Pick2Learn-unsigned.ipa $CM_BUILD_DIR/
    artifacts:
      - Pick2Learn-unsigned.ipa
