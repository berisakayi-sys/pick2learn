# Codemagic CI/CD config for Pick2Learn.
#
# Two workflows:
#   * ios-adhoc    — builds a SIGNED ad-hoc .ipa (installs on your registered
#                    iPad for ~1 year via a Safari link, no cable). USE THIS.
#   * ios-unsigned — builds an UNSIGNED .ipa (for Sideloadly). Kept as a backup.

workflows:
  # ---------------------------------------------------------------------------
  # SIGNED ad-hoc build — installs straight onto your iPad over the internet.
  # ---------------------------------------------------------------------------
  ios-adhoc:
    name: iOS Ad Hoc (signed for iPad)
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Makes the App Store Connect API key (added in Codemagic UI as
    # "pick2learn_asc") available to the signing CLI below.
    integrations:
      app_store_connect: pick2learn_asc
    environment:
      flutter: 3.32.5
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.example.pick2learn"
    scripts:
      - name: Register the iPad UDID (safe to re-run)
        script: |
          app-store-connect devices register \
            --name "iPad Air" \
            --platform IOS \
            --udid c2df88a2d879a687572be0c8ccaa8be74118e765 || \
            echo "Device already registered — continuing."
      - name: Initialize keychain
        script: keychain initialize
      - name: Create/fetch the ad-hoc signing certificate + profile
        # --create makes the App ID, the signing certificate, and an ad-hoc
        # provisioning profile (which includes every registered device) if they
        # don't already exist.
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --platform IOS \
            --create
      - name: Add the certificate to the keychain
        script: keychain add-certificates
      - name: Apply the provisioning profile to the Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed ad-hoc IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

  # ---------------------------------------------------------------------------
  # UNSIGNED build (backup, for Sideloadly). Not needed if ios-adhoc works.
  # ---------------------------------------------------------------------------
  ios-unsigned:
    name: iOS unsigned IPA (for sideloading)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.5
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS (no code signing)
        script: flutter build ios --release --no-codesign
      - name: Package into an unsigned .ipa
        script: |
          set -e
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r9 Pick2Learn-unsigned.ipa Payload
          mv Pick2Learn-unsigned.ipa $CM_BUILD_DIR/
    artifacts:
      - Pick2Learn-unsigned.ipa
